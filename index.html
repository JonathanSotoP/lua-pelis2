<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuaPelis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0e0e;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ── Splash de carga ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #e8b94a;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .splash-title span {
      color: #fff;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a2a;
      border-top-color: #e8b94a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── iframe principal ── */
    #appFrame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      background: #0e0e0e;
    }
  </style>
</head>
<body>

  <!-- Splash mientras carga el iframe -->
  <div id="splash">
    <div class="splash-title">LUA<span>PELIS</span></div>
    <div class="spinner"></div>
  </div>

  <!-- App principal cargada desde GitHub Pages con ?mode=tv forzado -->
  <iframe
    id="appFrame"
    src="https://jonathansotop.github.io/lua-pelis2/?mode=tv"
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation"
  ></iframe>
</body>
</html>
