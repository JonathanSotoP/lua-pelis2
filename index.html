<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LuaPelis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e0e;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    .title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #e8b94a;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .title span { color: #fff; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a2a;
      border-top-color: #e8b94a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="title">LUA<span>PELIS</span></div>
  <div class="spinner"></div>

  <script>
    (function() {
      if (typeof tizen === 'undefined') return;
      var keys = [
        'MediaPlay','MediaPause','MediaStop','MediaPlayPause',
        'MediaFastForward','MediaRewind',
        'ColorF0Red','ColorF1Green','ColorF2Yellow','ColorF3Blue'
      ];
      keys.forEach(function(k) {
        try { tizen.tvinputdevice.registerKey(k); } catch(e) {}
      });
    })();

    setTimeout(function() {
      window.location.replace('https://jonathansotop.github.io/lua-pelis/?mode=tv');
    }, 800);
  </script>

</body>
</html>
