<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuaPelis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0e0e;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ── Splash de carga ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #e8b94a;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .splash-title span {
      color: #fff;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a2a2a;
      border-top-color: #e8b94a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── iframe principal ── */
    #appFrame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      background: #0e0e0e;
    }
  </style>
</head>
<body>

  <!-- Splash mientras carga el iframe -->
  <div id="splash">
    <div class="splash-title">LUA<span>PELIS</span></div>
    <div class="spinner"></div>
  </div>

  <!-- App principal cargada desde GitHub Pages con ?mode=tv forzado -->
  <iframe
    id="appFrame"
    src="https://jonathansotop.github.io/lua-pelis2/?mode=tv"
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation"
  ></iframe>

  <script>
// Navegación D-pad para Tizen TV
(function() {
  if (typeof tizen === 'undefined') return;

  // Registrar teclas
  var keys = ['MediaPlay','MediaPause','MediaStop','MediaPlayPause','MediaFastForward','MediaRewind'];
  keys.forEach(function(k) { try { tizen.tvinputdevice.registerKey(k); } catch(e) {} });

  // Selector de elementos focuseables
  var FOCUSABLE = 'a, button, [data-focusable], .card, .nav-item, .sidebar-item, [onclick]';
  var focused = null;

  function getFocusables() {
    return Array.from(document.querySelectorAll(FOCUSABLE)).filter(function(el) {
      var r = el.getBoundingClientRect();
      return r.width > 0 && r.height > 0;
    });
  }

  function setFocus(el) {
    if (focused) focused.classList.remove('tv-focus');
    focused = el;
    if (focused) {
      focused.classList.add('tv-focus');
      focused.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
  }

  function getRect(el) { return el.getBoundingClientRect(); }

  function findNearest(dir) {
    var els = getFocusables();
    if (!focused) { setFocus(els[0]); return; }
    var cr = getRect(focused);
    var cx = cr.left + cr.width / 2;
    var cy = cr.top + cr.height / 2;
    var best = null, bestScore = Infinity;

    els.forEach(function(el) {
      if (el === focused) return;
      var r = getRect(el);
      var ex = r.left + r.width / 2;
      var ey = r.top + r.height / 2;
      var dx = ex - cx, dy = ey - cy;
      var valid = false;
      if (dir === 'right' && dx > 10) valid = true;
      if (dir === 'left'  && dx < -10) valid = true;
      if (dir === 'down'  && dy > 10) valid = true;
      if (dir === 'up'    && dy < -10) valid = true;
      if (!valid) return;
      var score = Math.sqrt(dx*dx + dy*dy);
      if (score < bestScore) { bestScore = score; best = el; }
    });

    if (best) setFocus(best);
  }

  document.addEventListener('keydown', function(e) {
    var els = getFocusables();
    if (!focused && els.length) setFocus(els[0]);
    switch(e.keyCode) {
      case 37: e.preventDefault(); findNearest('left');  break;
      case 38: e.preventDefault(); findNearest('up');    break;
      case 39: e.preventDefault(); findNearest('right'); break;
      case 40: e.preventDefault(); findNearest('down');  break;
      case 13: e.preventDefault(); if (focused) focused.click(); break;
      case 10009: e.preventDefault(); window.history.back(); break;
    }
  });

  // Estilo del foco
  var style = document.createElement('style');
  style.textContent = '.tv-focus { outline: 3px solid #e8b94a !important; outline-offset: 2px !important; }';
  document.head.appendChild(style);
})();
</script>
</body>
</html>
